<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlowForge — Accedi</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="alternate icon" type="image/png" href="favicon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #1a1a24; --bg-2: #232333; --bg-3: #2d2d42; --border: #3c3c55;
    --text: #e8e8f0; --text-muted: #8a8aa3; --primary: #ff6d5a; --primary-dim: #c4503f;
    --error: #e05252; --success: #4caf7d;
  }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .card {
    width: 100%; max-width: 380px; background: var(--bg-2);
    border: 1px solid var(--border); border-radius: 14px; padding: 32px 28px;
    box-shadow: 0 12px 40px rgba(0,0,0,.4);
  }
  .brand { text-align: center; margin-bottom: 22px; }
  .brand .logo { font-size: 26px; font-weight: 800; letter-spacing: .5px; }
  .brand .sub { color: var(--text-muted); font-size: 13px; margin-top: 4px; }
  .tabs { display: flex; gap: 6px; margin-bottom: 20px; background: var(--bg); border-radius: 9px; padding: 4px; }
  .tab { flex: 1; text-align: center; padding: 8px; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 13px; color: var(--text-muted); }
  .tab.active { background: var(--bg-3); color: var(--text); }
  label { display: block; font-size: 12px; color: var(--text-muted); margin: 14px 0 6px; font-weight: 600; }
  input {
    width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text);
    padding: 11px 12px; border-radius: 8px; font-size: 14px;
  }
  input:focus { outline: none; border-color: var(--primary); }
  .btn {
    width: 100%; margin-top: 22px; background: var(--primary); border: none; color: #fff;
    padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .btn:hover { background: var(--primary-dim); }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .remember { display: flex; align-items: center; gap: 8px; margin-top: 14px; cursor: pointer; }
  .remember input { width: auto; margin: 0; accent-color: var(--primary); cursor: pointer; }
  .remember span { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .msg { margin-top: 16px; font-size: 13px; text-align: center; min-height: 18px; }
  .msg.error { color: var(--error); }
  .msg.success { color: var(--success); }
  .hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <div class="logo">⚡ FlowForge</div>
      <div class="sub">Automazione no-code — area riservata</div>
    </div>

    <div class="tabs">
      <div class="tab active" data-mode="login">Accedi</div>
      <div class="tab" data-mode="register">Registrati</div>
    </div>

    <form id="form">
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="email" placeholder="tu@esempio.it" required>

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="••••••••" required>
      <div class="hint" id="pw-hint" style="display:none">Almeno 8 caratteri.</div>

      <label class="remember" for="remember">
        <input id="remember" type="checkbox" checked>
        <span>Ricordami su questo dispositivo</span>
      </label>

      <button class="btn" id="submit" type="submit">Accedi</button>
      <div class="msg" id="msg"></div>
    </form>
  </div>

<script>
  let mode = 'login';
  const $ = id => document.getElementById(id);
  const msg = (text, type='') => { const m = $('msg'); m.textContent = text; m.className = 'msg ' + type; };

  document.querySelectorAll('.tab').forEach(tab => {
    tab.onclick = () => {
      mode = tab.dataset.mode;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === tab));
      $('submit').textContent = mode === 'login' ? 'Accedi' : 'Crea account';
      $('password').setAttribute('autocomplete', mode === 'login' ? 'current-password' : 'new-password');
      $('pw-hint').style.display = mode === 'register' ? 'block' : 'none';
      msg('');
    };
  });

  $('form').onsubmit = async (e) => {
    e.preventDefault();
    const email = $('email').value.trim();
    const password = $('password').value;
    $('submit').disabled = true;
    msg(mode === 'login' ? 'Accesso in corso…' : 'Creazione account…');
    try {
      const res = await fetch('/api/auth/' + (mode === 'login' ? 'login' : 'register'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'same-origin',
        body: JSON.stringify({ email, password, remember: $('remember').checked }),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || 'Errore');
      msg('Fatto! Reindirizzamento…', 'success');
      window.location.href = '/';
    } catch (err) {
      msg(err.message, 'error');
      $('submit').disabled = false;
    }
  };
</script>
</body>
</html>
